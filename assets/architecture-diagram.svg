<svg viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1225"/>
    </linearGradient>
    <linearGradient id="cyan-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0099cc" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="orange-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#ff9500"/>
    </linearGradient>
    <linearGradient id="purple-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="green-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="red-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="pink-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="blue-glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft-glow">
      <feGaussianBlur stdDeviation="1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="900" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="38" text-anchor="middle" fill="#00d4ff" font-size="28" font-weight="bold" filter="url(#glow)">NILEFLOW</text>
  <text x="700" y="58" text-anchor="middle" fill="#e0e0e0" font-size="12">Real-Time Traffic &amp; Transit Intelligence Platform</text>
  <text x="700" y="72" text-anchor="middle" fill="#888" font-size="10">Greater Cairo &amp; Alexandria</text>

  <!-- ============ 1. DATA SOURCES (left) ============ -->
  <rect x="15" y="95" width="200" height="310" rx="8" fill="none" stroke="#ff6b35" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="25" y="86" width="120" height="18" rx="4" fill="#1a1a2e"/>
  <text x="85" y="98" text-anchor="middle" fill="#ff6b35" font-size="10" font-weight="bold">1. DATA SOURCES</text>

  <!-- TomTom -->
  <rect x="25" y="110" width="180" height="60" rx="6" fill="#1a1a2e" stroke="#ff6b35" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="115" y="130" text-anchor="middle" fill="#ff9500" font-size="11" font-weight="bold">Traffic / Routing API</text>
  <text x="115" y="145" text-anchor="middle" fill="#aaa" font-size="9">Live traffic &amp; travel time data</text>
  <text x="115" y="162" text-anchor="middle" fill="#ff6b35" font-size="10" font-weight="bold">TomTom</text>

  <!-- Open-Meteo -->
  <rect x="25" y="180" width="180" height="60" rx="6" fill="#1a1a2e" stroke="#ff6b35" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="115" y="200" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="bold">Open-Meteo Weather API</text>
  <text x="115" y="215" text-anchor="middle" fill="#aaa" font-size="9">Weather observations for</text>
  <text x="115" y="228" text-anchor="middle" fill="#aaa" font-size="9">Cairo &amp; Alexandria</text>

  <!-- Simulated Vehicle Positions (was GTFS) -->
  <rect x="25" y="250" width="180" height="65" rx="6" fill="#1a1a2e" stroke="#ff6b35" stroke-width="0.8" stroke-opacity="0.3"/>
  <text x="115" y="270" text-anchor="middle" fill="#a855f7" font-size="11" font-weight="bold">Simulated Vehicle</text>
  <text x="115" y="284" text-anchor="middle" fill="#a855f7" font-size="11" font-weight="bold">Positions</text>
  <text x="115" y="300" text-anchor="middle" fill="#aaa" font-size="9">GPS pings along monitored</text>
  <text x="115" y="312" text-anchor="middle" fill="#aaa" font-size="9">corridor geometries</text>

  <!-- ============ 2. INGESTION LAYER ============ -->
  <rect x="240" y="95" width="230" height="230" rx="8" fill="none" stroke="#00d4ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="250" y="86" width="135" height="18" rx="4" fill="#1a1a2e"/>
  <text x="317" y="98" text-anchor="middle" fill="#00d4ff" font-size="10" font-weight="bold">2. INGESTION LAYER</text>

  <text x="355" y="125" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Apache Kafka</text>
  <text x="355" y="142" text-anchor="middle" fill="#888" font-size="9">Real-time event streaming</text>

  <rect x="260" y="155" width="200" height="28" rx="4" fill="#111830" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="278" cy="169" r="6" fill="#ef4444" fill-opacity="0.3" stroke="#ef4444" stroke-width="0.8"/>
  <text x="295" y="173" fill="#e0e0e0" font-size="10">traffic_events</text>

  <rect x="260" y="190" width="200" height="28" rx="4" fill="#111830" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="278" cy="204" r="6" fill="#22c55e" fill-opacity="0.3" stroke="#22c55e" stroke-width="0.8"/>
  <text x="295" y="208" fill="#e0e0e0" font-size="10">weather_events</text>

  <rect x="260" y="225" width="200" height="28" rx="4" fill="#111830" stroke="#00d4ff" stroke-width="0.5" stroke-opacity="0.3"/>
  <circle cx="278" cy="239" r="6" fill="#a855f7" fill-opacity="0.3" stroke="#a855f7" stroke-width="0.8"/>
  <text x="295" y="243" fill="#e0e0e0" font-size="10">vehicle_position_events</text>

  <!-- Arrow: Data Sources → Kafka -->
  <line x1="205" y1="210" x2="240" y2="210" stroke="#ff6b35" stroke-width="1.5" marker-end="url(#arrow-orange)"/>
  <defs>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ff6b35"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#00d4ff"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22c55e"/>
    </marker>
    <marker id="arrow-red" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a855f7"/>
    </marker>
    <marker id="arrow-white" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#aaa"/>
    </marker>
  </defs>

  <!-- ============ 3. STREAM PROCESSING ============ -->
  <rect x="495" y="95" width="260" height="230" rx="8" fill="none" stroke="#ff9500" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="505" y="86" width="215" height="18" rx="4" fill="#1a1a2e"/>
  <text x="612" y="98" text-anchor="middle" fill="#ff9500" font-size="10" font-weight="bold">3. STREAM PROCESSING &amp; ANALYTICS</text>

  <text x="625" y="125" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="bold">Apache Spark</text>
  <text x="625" y="140" text-anchor="middle" fill="#ff9500" font-size="10">Structured Streaming</text>

  <rect x="515" y="155" width="220" height="28" rx="4" fill="#111830"/>
  <text x="535" y="173" fill="#e0e0e0" font-size="10">Window Joins</text>

  <rect x="515" y="190" width="220" height="28" rx="4" fill="#111830"/>
  <text x="535" y="208" fill="#e0e0e0" font-size="10">Watermarking</text>

  <rect x="515" y="225" width="220" height="28" rx="4" fill="#111830"/>
  <text x="535" y="243" fill="#e0e0e0" font-size="10">Congestion Index (rolling)</text>

  <rect x="515" y="260" width="220" height="28" rx="4" fill="#111830"/>
  <text x="535" y="278" fill="#e0e0e0" font-size="10">Anomaly Detection</text>

  <text x="625" y="310" text-anchor="middle" fill="#888" font-size="9">Correlate · Analyze · Detect</text>

  <!-- Arrow: Kafka → Spark -->
  <line x1="470" y1="200" x2="495" y2="200" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrow-cyan)"/>

  <!-- ============ 4. STORAGE LAYER (right) ============ -->
  <rect x="790" y="85" width="260" height="330" rx="8" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="800" y="76" width="235" height="18" rx="4" fill="#1a1a2e"/>
  <text x="917" y="88" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="bold">4. STORAGE LAYER (POLYGLOT PERSISTENCE)</text>

  <!-- PostgreSQL -->
  <rect x="805" y="100" width="235" height="75" rx="6" fill="#1a1a2e" stroke="#3b82f6" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="922" y="120" text-anchor="middle" fill="#3b82f6" font-size="13" font-weight="bold">PostgreSQL</text>
  <text x="922" y="135" text-anchor="middle" fill="#60a5fa" font-size="9">Reference Data</text>
  <text x="922" y="150" text-anchor="middle" fill="#888" font-size="9">Routes, Stops, Districts,</text>
  <text x="922" y="163" text-anchor="middle" fill="#888" font-size="9">Corridors, Baselines</text>

  <!-- Cassandra -->
  <rect x="805" y="185" width="235" height="75" rx="6" fill="#1a1a2e" stroke="#22c55e" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="922" y="205" text-anchor="middle" fill="#22c55e" font-size="13" font-weight="bold">Apache Cassandra</text>
  <text x="922" y="220" text-anchor="middle" fill="#4ade80" font-size="9">Time-Series Data</text>
  <text x="922" y="235" text-anchor="middle" fill="#888" font-size="9">Congestion metrics,</text>
  <text x="922" y="248" text-anchor="middle" fill="#888" font-size="9">weather metrics, transit metrics</text>

  <!-- Elasticsearch -->
  <rect x="805" y="270" width="235" height="75" rx="6" fill="#1a1a2e" stroke="#eab308" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="922" y="290" text-anchor="middle" fill="#eab308" font-size="13" font-weight="bold">Elasticsearch</text>
  <text x="922" y="305" text-anchor="middle" fill="#fde047" font-size="9">Alerts &amp; Event Logs</text>
  <text x="922" y="320" text-anchor="middle" fill="#888" font-size="9">Anomalies, delays,</text>
  <text x="922" y="333" text-anchor="middle" fill="#888" font-size="9">system logs, search</text>

  <!-- Arrows: Spark → Storage -->
  <line x1="755" y1="160" x2="805" y2="137" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#arrow-cyan)"/>
  <line x1="755" y1="210" x2="805" y2="222" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="755" y1="270" x2="805" y2="305" stroke="#eab308" stroke-width="1.5" marker-end="url(#arrow-orange)"/>

  <!-- ============ 5. ORCHESTRATION & DATA OPERATIONS ============ -->
  <rect x="240" y="360" width="350" height="200" rx="8" fill="none" stroke="#22c55e" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="250" y="351" width="230" height="18" rx="4" fill="#1a1a2e"/>
  <text x="365" y="363" text-anchor="middle" fill="#22c55e" font-size="10" font-weight="bold">5. ORCHESTRATION &amp; DATA OPERATIONS</text>

  <text x="340" y="390" text-anchor="middle" fill="#ffffff" font-size="14" font-weight="bold">Apache Airflow</text>

  <rect x="260" y="400" width="155" height="55" rx="5" fill="#111830" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="337" y="418" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">Daily Refresh DAGs</text>
  <text x="337" y="432" text-anchor="middle" fill="#888" font-size="8">· Reference data refresh</text>
  <text x="337" y="444" text-anchor="middle" fill="#888" font-size="8">· Baseline recalculation</text>

  <rect x="425" y="400" width="145" height="55" rx="5" fill="#111830" stroke="#22c55e" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="497" y="418" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">Data Quality DAGs</text>
  <text x="497" y="432" text-anchor="middle" fill="#888" font-size="8">· Freshness checks</text>
  <text x="497" y="444" text-anchor="middle" fill="#888" font-size="8">· Data quality checks</text>

  <!-- PostgreSQL (Airflow metadata) -->
  <rect x="310" y="480" width="160" height="45" rx="5" fill="#111830" stroke="#3b82f6" stroke-width="0.5" stroke-opacity="0.3"/>
  <text x="390" y="500" text-anchor="middle" fill="#3b82f6" font-size="10" font-weight="bold">PostgreSQL</text>
  <text x="390" y="515" text-anchor="middle" fill="#888" font-size="8">Metadata &amp; Airflow DB</text>

  <!-- Dashed arrows: Airflow ↔ Storage -->
  <line x1="500" y1="360" x2="620" y2="325" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.5"/>

  <!-- ============ 6. ALERTING CHANNEL ============ -->
  <rect x="640" y="400" width="200" height="130" rx="8" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="650" y="391" width="130" height="18" rx="4" fill="#1a1a2e"/>
  <text x="715" y="403" text-anchor="middle" fill="#ef4444" font-size="10" font-weight="bold">6. ALERTING CHANNEL</text>

  <text x="740" y="435" text-anchor="middle" fill="#ef4444" font-size="16" font-weight="bold">Redis</text>
  <text x="740" y="452" text-anchor="middle" fill="#ff6b6b" font-size="10">Redis Pub/Sub</text>
  <text x="740" y="470" text-anchor="middle" fill="#888" font-size="9">Fan-out alerts</text>
  <text x="740" y="483" text-anchor="middle" fill="#888" font-size="9">in real-time</text>

  <!-- Discord -->
  <rect x="660" y="495" width="160" height="28" rx="5" fill="#111830" stroke="#7c3aed" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="740" y="513" text-anchor="middle" fill="#a855f7" font-size="10" font-weight="bold">Discord Webhook</text>

  <!-- Arrow: Spark anomalies → Redis -->
  <path d="M 625 325 L 625 360 L 690 400" fill="none" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="610" y="355" fill="#ef4444" font-size="8">Anomaly Events</text>

  <!-- Arrow: Redis → Discord -->
  <line x1="740" y1="483" x2="740" y2="495" stroke="#a855f7" stroke-width="1" stroke-opacity="0.5"/>

  <!-- ============ 7. VISUALIZATION LAYER ============ -->
  <rect x="1075" y="360" width="260" height="170" rx="8" fill="none" stroke="#ec4899" stroke-width="1.5" stroke-opacity="0.6"/>
  <rect x="1085" y="351" width="150" height="18" rx="4" fill="#1a1a2e"/>
  <text x="1160" y="363" text-anchor="middle" fill="#ec4899" font-size="10" font-weight="bold">7. VISUALIZATION LAYER</text>

  <!-- Streamlit -->
  <rect x="1095" y="380" width="220" height="130" rx="6" fill="#1a1a2e" stroke="#ec4899" stroke-width="0.8" stroke-opacity="0.4"/>
  <text x="1205" y="405" text-anchor="middle" fill="#ec4899" font-size="16" font-weight="bold">Streamlit</text>
  <text x="1205" y="422" text-anchor="middle" fill="#f472b6" font-size="10">Live Dashboard</text>
  <text x="1205" y="445" text-anchor="middle" fill="#888" font-size="9">Heatmap · Trends</text>
  <text x="1205" y="460" text-anchor="middle" fill="#888" font-size="9">Alerts · Insights</text>
  <text x="1205" y="480" text-anchor="middle" fill="#888" font-size="9">Live Vehicle Map</text>
  <text x="1205" y="500" text-anchor="middle" fill="#888" font-size="9">Weather Sidebar</text>

  <!-- Arrow: Redis → Streamlit (live alerts) -->
  <line x1="840" y1="460" x2="1075" y2="460" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <text x="960" y="453" text-anchor="middle" fill="#ef4444" font-size="8">Live Alerts</text>

  <!-- Arrow: Storage → Streamlit -->
  <line x1="1050" y1="300" x2="1150" y2="380" stroke="#a855f7" stroke-width="1" stroke-dasharray="4,3" stroke-opacity="0.5"/>

  <!-- ============ 8. INFRASTRUCTURE & DEVOPS ============ -->
  <rect x="240" y="590" width="580" height="100" rx="8" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-opacity="0.4"/>
  <rect x="250" y="581" width="195" height="18" rx="4" fill="#1a1a2e"/>
  <text x="347" y="593" text-anchor="middle" fill="#9ca3af" font-size="10" font-weight="bold">8. INFRASTRUCTURE &amp; DEVOPS</text>

  <rect x="260" y="610" width="120" height="55" rx="5" fill="#111830"/>
  <text x="320" y="633" text-anchor="middle" fill="#2563eb" font-size="12" font-weight="bold">Docker</text>
  <text x="320" y="650" text-anchor="middle" fill="#888" font-size="9">Containers</text>

  <rect x="400" y="610" width="130" height="55" rx="5" fill="#111830"/>
  <text x="465" y="633" text-anchor="middle" fill="#2563eb" font-size="12" font-weight="bold">Docker Compose</text>
  <text x="465" y="650" text-anchor="middle" fill="#888" font-size="9">Full-stack orchestration</text>

  <rect x="550" y="610" width="120" height="55" rx="5" fill="#111830"/>
  <text x="610" y="633" text-anchor="middle" fill="#e0e0e0" font-size="12" font-weight="bold">GitHub</text>
  <text x="610" y="650" text-anchor="middle" fill="#888" font-size="9">Source Code &amp; CI/CD</text>

  <rect x="690" y="610" width="120" height="55" rx="5" fill="#111830"/>
  <text x="750" y="633" text-anchor="middle" fill="#22c55e" font-size="12" font-weight="bold">Monitoring</text>
  <text x="750" y="648" text-anchor="middle" fill="#888" font-size="8">Health Checks · Logs</text>
  <text x="750" y="660" text-anchor="middle" fill="#888" font-size="8">Metrics · Alerts</text>

  <!-- ============ LEGEND ============ -->
  <rect x="1075" y="560" width="260" height="120" rx="8" fill="#111830" stroke="#4b5563" stroke-width="1" stroke-opacity="0.4"/>
  <text x="1205" y="580" text-anchor="middle" fill="#e0e0e0" font-size="11" font-weight="bold">LEGEND</text>

  <line x1="1095" y1="595" x2="1135" y2="595" stroke="#00d4ff" stroke-width="2"/>
  <polygon points="1133,592 1140,595 1133,598" fill="#00d4ff"/>
  <text x="1150" y="599" fill="#aaa" font-size="9">Main Data Flow</text>

  <line x1="1095" y1="615" x2="1135" y2="615" stroke="#22c55e" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="1150" y="619" fill="#aaa" font-size="9">Orchestration / Reference Flow</text>

  <line x1="1095" y1="635" x2="1135" y2="635" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="1150" y="639" fill="#aaa" font-size="9">Alert Flow</text>

  <line x1="1095" y1="655" x2="1135" y2="655" stroke="#a855f7" stroke-width="1.5" stroke-opacity="0.5"/>
  <text x="1150" y="659" fill="#aaa" font-size="9">Streaming Events</text>

  <!-- NileFlow branding bottom-left -->
  <text x="40" y="660" fill="#00d4ff" font-size="16" font-weight="bold" filter="url(#glow)">NILEFLOW</text>
  <text x="40" y="675" fill="#888" font-size="8">Turning Data into</text>
  <text x="40" y="685" fill="#888" font-size="8">Smarter Mobility</text>

  <!-- Flow arrows between major sections -->
  <!-- Spark → Redis (anomaly) already done above -->
  <!-- Storage → Dashboard already done above -->

</svg>
