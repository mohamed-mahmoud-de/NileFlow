services:
  # ========== MESSAGE BROKER ==========
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nileflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - nileflow-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nileflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - nileflow-net

  # ========== DATABASES ==========
  postgres:
    image: postgres:16-alpine
    container_name: nileflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nileflow}
      POSTGRES_USER: ${POSTGRES_USER:-nileflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nileflow_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./storage/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - nileflow-net

  cassandra:
    image: cassandra:4.1
    container_name: nileflow-cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
      - ./storage/cassandra/init:/init
    environment:
      CASSANDRA_CLUSTER_NAME: nileflow
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    networks:
      - nileflow-net

  cassandra-init:
    image: cassandra:4.1
    container_name: nileflow-cassandra-init
    depends_on:
      - cassandra
    volumes:
      - ./storage/cassandra/init:/init
    entrypoint: >
      bash -c "
        echo 'Waiting for Cassandra to be ready...';
        until cqlsh cassandra 9042 -e 'DESCRIBE KEYSPACES' > /dev/null 2>&1; do
          sleep 5;
        done;
        echo 'Cassandra is ready. Running init CQL...';
        cqlsh cassandra 9042 -f /init/create_keyspace.cql;
        echo 'Cassandra init complete.';
      "
    networks:
      - nileflow-net

  redis:
    image: redis:7-alpine
    container_name: nileflow-redis
    ports:
      - "6379:6379"
    networks:
      - nileflow-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: nileflow-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - nileflow-net

  elasticsearch-init:
    image: curlimages/curl:latest
    container_name: nileflow-elasticsearch-init
    depends_on:
      - elasticsearch
    entrypoint: >
      sh -c "
        echo 'Waiting for Elasticsearch to be ready...';
        until curl -s http://elasticsearch:9200/_cluster/health | grep -q '\"status\":\"green\"\|\"status\":\"yellow\"'; do
          sleep 3;
        done;
        echo 'Elasticsearch is ready. Creating indices...';
        curl -s -X PUT http://elasticsearch:9200/congestion_alerts -H 'Content-Type: application/json' -d '{\"settings\":{\"number_of_shards\":1,\"number_of_replicas\":0},\"mappings\":{\"properties\":{\"corridor_id\":{\"type\":\"keyword\"},\"alert_type\":{\"type\":\"keyword\"},\"severity\":{\"type\":\"keyword\"},\"congestion_index\":{\"type\":\"double\"},\"speed_kmh\":{\"type\":\"double\"},\"baseline_speed\":{\"type\":\"double\"},\"message\":{\"type\":\"text\"},\"event_time\":{\"type\":\"date\"},\"created_at\":{\"type\":\"date\"}}}}';
        echo '';
        curl -s -X PUT http://elasticsearch:9200/pipeline_events -H 'Content-Type: application/json' -d '{\"settings\":{\"number_of_shards\":1,\"number_of_replicas\":0},\"mappings\":{\"properties\":{\"event_type\":{\"type\":\"keyword\"},\"source\":{\"type\":\"keyword\"},\"corridor_id\":{\"type\":\"keyword\"},\"message\":{\"type\":\"text\"},\"details\":{\"type\":\"object\",\"enabled\":true},\"event_time\":{\"type\":\"date\"},\"created_at\":{\"type\":\"date\"}}}}';
        echo '';
        echo 'Elasticsearch indices created.';
      "
    networks:
      - nileflow-net

  # ========== ORCHESTRATION ==========
  airflow-init:
    image: apache/airflow:2.10.4-python3.11
    container_name: nileflow-airflow-init
    entrypoint: >
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname NileFlow --lastname Admin --role Admin --email admin@nileflow.local || true"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://nileflow:nileflow_dev@postgres:5432/nileflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    depends_on:
      - postgres
    networks:
      - nileflow-net

  airflow-webserver:
    image: apache/airflow:2.10.4-python3.11
    container_name: nileflow-airflow-webserver
    command: >
      bash -c "pip install --quiet psycopg2-binary cassandra-driver confluent-kafka requests python-dotenv
      && airflow webserver --port 8080"
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://nileflow:nileflow_dev@postgres:5432/nileflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      PYTHONPATH: /opt/airflow/project
      POSTGRES_HOST: postgres
      CASSANDRA_HOSTS: cassandra
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./config:/opt/airflow/project/config
      - airflow-logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - nileflow-net

  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.11
    container_name: nileflow-airflow-scheduler
    command: >
      bash -c "pip install --quiet psycopg2-binary cassandra-driver confluent-kafka requests python-dotenv
      && airflow scheduler"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://nileflow:nileflow_dev@postgres:5432/nileflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      PYTHONPATH: /opt/airflow/project
      POSTGRES_HOST: postgres
      CASSANDRA_HOSTS: cassandra
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./config:/opt/airflow/project/config
      - airflow-logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - nileflow-net

  # ========== SPARK ==========
  spark-master:
    image: apache/spark:3.5.6-python3
    container_name: nileflow-spark-master
    hostname: spark-master
    user: root
    command: >
      bash -c "pip install --quiet requests redis && /opt/spark/sbin/start-master.sh"
    ports:
      - "7077:7077"
      - "8081:8080"
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./spark:/opt/nileflow/spark
      - ./config:/opt/nileflow/config
      - spark-ivy-cache:/root/.ivy2
    networks:
      - nileflow-net

  spark-worker:
    image: apache/spark:3.5.6-python3
    container_name: nileflow-spark-worker
    hostname: spark-worker
    user: root
    depends_on:
      - spark-master
    command: >
      bash -c "pip install --quiet requests redis && /opt/spark/sbin/start-worker.sh spark://spark-master:7077"
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./spark:/opt/nileflow/spark
      - ./config:/opt/nileflow/config
      - spark-ivy-cache:/root/.ivy2
    networks:
      - nileflow-net

  # ========== PRODUCERS ==========
  traffic-producer:
    image: python:3.11-slim
    container_name: nileflow-traffic-producer
    working_dir: /app
    command: >
      bash -c "pip install --quiet confluent-kafka requests python-dotenv
      && python -m producers.traffic.producer"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      TOMTOM_API_KEY: ${TOMTOM_API_KEY}
      REDIS_HOST: redis
    volumes:
      - .:/app
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - nileflow-net

  weather-producer:
    image: python:3.11-slim
    container_name: nileflow-weather-producer
    working_dir: /app
    command: >
      bash -c "pip install --quiet confluent-kafka requests python-dotenv
      && python -m producers.weather.producer"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    volumes:
      - .:/app
    depends_on:
      - kafka
    restart: unless-stopped
    networks:
      - nileflow-net

  vehicle-positions-producer:
    image: python:3.11-slim
    container_name: nileflow-vehicle-positions-producer
    working_dir: /app
    command: >
      bash -c "pip install --quiet confluent-kafka redis python-dotenv
      && python -m producers.vehicle_positions.producer"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      REDIS_HOST: redis
      REDIS_PORT: 6379
    volumes:
      - .:/app
    depends_on:
      - kafka
      - redis
    restart: unless-stopped
    networks:
      - nileflow-net

  # ========== DASHBOARD ==========
  dashboard:
    image: python:3.11-slim
    container_name: nileflow-dashboard
    working_dir: /app
    command: >
      bash -c "pip install --quiet streamlit folium streamlit-folium plotly cassandra-driver pyasyncore requests redis
      && streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0"
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      CASSANDRA_HOST: cassandra
      REDIS_HOST: redis
    networks:
      - nileflow-net
    depends_on:
      - cassandra
      - elasticsearch
      - redis

  # ========== ALERTING ==========
  discord-alerter:
    image: python:3.11-slim
    container_name: nileflow-discord-alerter
    working_dir: /app
    command: >
      bash -c "pip install --quiet redis requests
      && python -m alerts.discord_alerter"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
    volumes:
      - .:/app
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - nileflow-net

networks:
  nileflow-net:
    driver: bridge

volumes:
  postgres-data:
  cassandra-data:
  elasticsearch-data:
  airflow-logs:
  spark-ivy-cache:
