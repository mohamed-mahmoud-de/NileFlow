services:
  # ========== MESSAGE BROKER ==========
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: nileflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - nileflow-net

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: nileflow-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - nileflow-net

  # ========== DATABASES ==========
  postgres:
    image: postgres:16-alpine
    container_name: nileflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nileflow}
      POSTGRES_USER: ${POSTGRES_USER:-nileflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nileflow_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./storage/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - nileflow-net

  cassandra:
    image: cassandra:4.1
    container_name: nileflow-cassandra
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
    environment:
      CASSANDRA_CLUSTER_NAME: nileflow
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    networks:
      - nileflow-net

  redis:
    image: redis:7-alpine
    container_name: nileflow-redis
    ports:
      - "6379:6379"
    networks:
      - nileflow-net

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: nileflow-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - nileflow-net

  # ========== ORCHESTRATION ==========
  airflow-init:
    image: apache/airflow:2.10.4-python3.11
    container_name: nileflow-airflow-init
    entrypoint: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin
          --firstname NileFlow --lastname Admin
          --role Admin --email admin@nileflow.local || true
      "
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://nileflow:nileflow_dev@postgres:5432/nileflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    depends_on:
      - postgres
    networks:
      - nileflow-net

  airflow-webserver:
    image: apache/airflow:2.10.4-python3.11
    container_name: nileflow-airflow-webserver
    command: airflow webserver --port 8080
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://nileflow:nileflow_dev@postgres:5432/nileflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow-logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - nileflow-net

  airflow-scheduler:
    image: apache/airflow:2.10.4-python3.11
    container_name: nileflow-airflow-scheduler
    command: airflow scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://nileflow:nileflow_dev@postgres:5432/nileflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - airflow-logs:/opt/airflow/logs
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    networks:
      - nileflow-net

  # ========== SPARK ==========
  spark-master:
    image: apache/spark:3.5.6-python3
    container_name: nileflow-spark-master
    hostname: spark-master
    user: root
    command: >
      bash -c "pip install --quiet requests && /opt/spark/sbin/start-master.sh"
    ports:
      - "7077:7077"
      - "8081:8080"
    environment:
      SPARK_MASTER_HOST: spark-master
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./spark:/opt/nileflow/spark
      - ./config:/opt/nileflow/config
      - spark-ivy-cache:/root/.ivy2
    networks:
      - nileflow-net

  spark-worker:
    image: apache/spark:3.5.6-python3
    container_name: nileflow-spark-worker
    hostname: spark-worker
    user: root
    depends_on:
      - spark-master
    command: >
      bash -c "pip install --quiet requests && /opt/spark/sbin/start-worker.sh spark://spark-master:7077"
    environment:
      SPARK_WORKER_MEMORY: 2G
      SPARK_WORKER_CORES: 2
      SPARK_NO_DAEMONIZE: "true"
    volumes:
      - ./spark:/opt/nileflow/spark
      - ./config:/opt/nileflow/config
      - spark-ivy-cache:/root/.ivy2
    networks:
      - nileflow-net

networks:
  nileflow-net:
    driver: bridge

volumes:
  postgres-data:
  cassandra-data:
  elasticsearch-data:
  airflow-logs:
  spark-ivy-cache:
